<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900">

<div class="container mx-auto px-6 py-10">

    <div class="mb-10 text-center">

        <h1 class="text-5xl font-extrabold text-white mb-4">
            ID Card Management System
        </h1>

        <p class="text-blue-200 text-lg">
            Manage Profiles, Templates and Generate Professional ID Cards
        </p>

    </div>

    <div class="grid md:grid-cols-3 gap-8">

        <a href="/profiles"
           class="bg-white/10 backdrop-blur-lg border border-white/20
                  rounded-3xl p-8 shadow-xl hover:scale-105
                  transition duration-300">

            <div class="text-6xl mb-4">👤</div>

            <h2 class="text-2xl font-bold text-white mb-2">
                Profiles
            </h2>

            <p class="text-blue-100">
                Manage all employees and students.
            </p>

        </a>

        <a href="/templates"
           class="bg-white/10 backdrop-blur-lg border border-white/20
                  rounded-3xl p-8 shadow-xl hover:scale-105
                  transition duration-300">

            <div class="text-6xl mb-4">🎨</div>

            <h2 class="text-2xl font-bold text-white mb-2">
                Templates
            </h2>

            <p class="text-blue-100">
                Create and customize ID card templates.
            </p>

        </a>

        <a th:if="${!profiles.isEmpty()}"
            th:href="@{/preview/{id}(id=${profiles[0].id})}"
           class="bg-white/10 backdrop-blur-lg border border-white/20
                  rounded-3xl p-8 shadow-xl hover:scale-105
                  transition duration-300">

            <div class="text-6xl mb-4">🪪</div>

            <h2 class="text-2xl font-bold text-white mb-2">
                Preview Card
            </h2>

            <p class="text-blue-100">
                Preview generated ID cards instantly.
            </p>

        </a>

    </div>

</div>

</body>
</html>
