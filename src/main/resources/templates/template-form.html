<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Template Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <h1 class="text-3xl font-bold mb-6">

        <span th:if="${template.id == null}">
            Create Template
        </span>

        <span th:if="${template.id != null}">
            Edit Template
        </span>

    </h1>

    <form
            th:object="${template}"
            method="post"
            action="/templates/save">

        <input type="hidden" th:field="*{id}">

        <div class="grid grid-cols-2 gap-4">

            <div>
                <label>Code</label>
                <input
                        type="text"
                        th:field="*{code}"
                        class="w-full border rounded p-3">
            </div>

            <div>
                <label>Name</label>
                <input
                        type="text"
                        th:field="*{name}"
                        class="w-full border rounded p-3">
            </div>

            <div>
                <label>Organization</label>
                <input
                        type="text"
                        th:field="*{organizationName}"
                        class="w-full border rounded p-3">
            </div>

            <div>
                <label>Layout</label>
                <select
                        th:field="*{layout}"
                        class="w-full border rounded p-3">

                    <option value="VERTICAL">
                        VERTICAL
                    </option>

                    <option value="HORIZONTAL">
                        HORIZONTAL
                    </option>

                </select>
            </div>

            <div>
                <label>Primary Color</label>
                <input
                        type="color"
                        th:field="*{primaryColor}"
                        class="w-full h-12">
            </div>

            <div>
                <label>Secondary Color</label>
                <input
                        type="color"
                        th:field="*{secondaryColor}"
                        class="w-full h-12">
            </div>

            <div>
                <label>Text Color</label>
                <input
                        type="color"
                        th:field="*{textColor}"
                        class="w-full h-12">
            </div>

            <div>
                <label>Tagline</label>
                <input
                        type="text"
                        th:field="*{tagline}"
                        class="w-full border rounded p-3">
            </div>

        </div>

        <div class="mt-6 flex gap-3">

            <button
                    type="submit"
                    class="bg-blue-600 text-white px-6 py-3 rounded">

                Save

            </button>

            <a
                    href="/templates"
                    class="bg-gray-600 text-white px-6 py-3 rounded">

                Cancel

            </a>

        </div>

    </form>

</div>

</body>
</html>
