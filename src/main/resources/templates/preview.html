<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-[800px]">

    <h1 class="text-3xl font-bold text-center mb-8">
        ID Card Preview
    </h1>

    <div class="bg-white shadow-2xl rounded-2xl overflow-hidden">

        <div class="bg-blue-700 text-white p-4 text-center">
            <h2 class="text-2xl font-bold">
                Institute of Technology of Cambodia
            </h2>

            <p>
                Student / Employee Identification Card
            </p>
        </div>

        <div class="p-6 flex gap-6">

            <!-- Photo -->
            <div>

                <img th:if="${profile.photoFileName != null}"
                    th:src="@{/uploads/{file}(file=${profile.photoFileName})}"
                    class="w-40 h-48 object-cover rounded">

                <div th:if="${profile.photoFileName == null}">
                    No Photo
                </div>

            </div>

            <!-- Details -->
            <div class="flex-1">

                <table class="w-full">

                    <tr>
                        <td class="font-bold py-2">Name</td>
                        <td th:text="${profile.fullName}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Registration No</td>
                        <td th:text="${profile.registrationNumber}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Department</td>
                        <td th:text="${profile.department}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Email</td>
                        <td th:text="${profile.email}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Phone</td>
                        <td th:text="${profile.phone}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Type</td>
                        <td th:text="${profile.type}"></td>
                    </tr>

                    <tr>
                        <td class="font-bold py-2">Blood Group</td>
                        <td th:text="${profile.bloodGroup}"></td>
                    </tr>

                </table>

            </div>

            <!-- QR -->
            <div class="text-center">

                <div class="font-semibold mb-2">
                    Verification QR
                </div>

                <img
                        th:src="@{/qr/{id}(id=${profile.id})}"
                        class="w-40 h-40 border">

                <p class="text-xs text-gray-500 mt-2">
                    Scan to verify
                </p>

            </div>

        </div>

        <div class="bg-gray-100 p-4 flex justify-between">

            <div>
                <strong>Issue:</strong>
                <span th:text="${profile.issueDate}"></span>
            </div>

            <div>
                <strong>Expiry:</strong>
                <span th:text="${profile.expiryDate}"></span>
            </div>

        </div>

    </div>

    <div class="mt-6 flex justify-center gap-4">

        <a
                th:href="@{/profiles}"
                class="bg-gray-600 text-white px-5 py-2 rounded-lg">

            Back

        </a>

        <a
                th:href="@{/pdf/{id}(id=${profile.id})}"
                class="bg-green-600 text-white px-5 py-2 rounded-lg">

            Export PDF

        </a>

    </div>

</div>

</body>
</html>
