---
- name: Build and Backup ID Card System
  hosts: web
  become: false

  vars:
    backup_dir: /var/jenkins_home/backups

  tasks:

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Backup MySQL Database
      shell: |
        docker exec idcard-mysql \
        mysqldump \
        -uroot \
        -pHello@123 \
        i4gica-lobunleang-db \
        > {{ backup_dir }}/backup.sql

    - name: Verify Backup
      stat:
        path: "{{ backup_dir }}/backup.sql"
      register: backup_file

    - name: Show Backup Size
      debug:
        msg: "Backup file size = {{ backup_file.stat.size }} bytes"