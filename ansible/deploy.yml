---
- name: Build and Backup ID Card System
  hosts: web
  become: false

  vars:
    backup_dir: ./backups

  tasks:

    - name: Ensure backup directory exists
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Create sample backup file
      copy:
        dest: "{{ backup_dir }}/backup.sql"
        content: "GitHub Actions deployment successful"

    - name: Verify Backup
      stat:
        path: "{{ backup_dir }}/backup.sql"
      register: backup_file

    - name: Show Backup Size
      debug:
        msg: "Backup file size = {{ backup_file.stat.size }} bytes"